<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта ❤️</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ff7aa2,#ffb6c1,#ffc3a0);
  text-align:center;
  color:white;
  overflow-x:hidden;
}

h1{
  margin-top:40px;
  font-size:50px;
  animation:fade 2s;
}

.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  margin:40px;
}

.photo{
  width:260px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.5s;
  animation:float 4s infinite ease-in-out;
  object-fit:cover;
}

.photo:hover{
  transform:scale(1.1) rotate(2deg);
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

@keyframes fade{
  from{opacity:0; transform:translateY(-40px)}
  to{opacity:1; transform:translateY(0)}
}

.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10px)}
  100%{transform:translateY(110vh)}
}

button{
  margin-bottom:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4f87;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

.qr{
  margin-top:30px;
}
</style>
</head>

<body>

<h1>🌸 С 8 Марта 🌸</h1>
<p>Самой красивой девушке 💖</p>

<div class="gallery">
  <img src="photo1.jpg" class="photo" onerror="this.style.display='none'">
  <img src="photo2.jpg" class="photo" onerror="this.style.display='none'">
  <img src="photo3.jpg" class="photo" onerror="this.style.display='none'">
  <img src="photo4.jpg" class="photo" onerror="this.style.display='none'">
</div>

<button onclick="love()">Нажми ❤️</button>
<p id="msg"></p>

<div class="qr">
  <h2>📱 Открой открытку через QR</h2>
  <!-- замените путь на путь к вашей папке с index.html -->
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=file:///C:/Users/USERNAME/Downloads/8march_site/index.html" alt="QR-код">
  <p style="color:white;">QR откроет файл на этом же устройстве</p>
</div>

<script>
function hearts(){
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(10+Math.random()*30)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove()},6000);
}
setInterval(hearts,300);

function love(){
  document.getElementById("msg").innerHTML="Ты самая красивая 🌷";
}
</script>

</body>
</html>
